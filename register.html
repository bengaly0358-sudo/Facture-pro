<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Facture Pro</title>
    <script>
        (function() {
            const saved = localStorage.getItem('darkMode');
            if (saved === 'true') {
                document.documentElement
                    .setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <link rel="stylesheet" href="css/darkmode.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px 35px;
            color: white;
        }

        .auth-card h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 5px;
        }

        .auth-card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #a0a0ff;
            font-weight: 400;
            font-size: 1.1em;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #ccc;
            font-size: 0.9em;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 1em;
            outline: none;
            transition: border 0.3s;
        }

        .input-group input:focus {
            border-color: #6c63ff;
        }

        .input-group input::placeholder {
            color: #777;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c63ff, #3f3d9e);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .btn-primary:hover { transform: scale(1.02); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
        }

        .auth-link a { color: #6c63ff; text-decoration: none; }

        .message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .message.success {
            display: block;
            background: rgba(39, 174, 96, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(39, 174, 96, 0.3);
        }

        .message.error {
            display: block;
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home a { color: #888; text-decoration: none; font-size: 0.9em; }
        .back-home a:hover { color: white; }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h1>🧾 Facture Pro</h1>
        <h2>Créer un compte gratuitement</h2>

        <form id="registerForm">
            <div class="input-group">
                <label>👤 Nom complet</label>
                <input type="text" id="fullName"
                       placeholder="Votre nom complet" required>
            </div>

            <div class="input-group">
                <label>📧 Adresse email</label>
                <input type="email" id="email"
                       placeholder="email@exemple.com" required>
            </div>

            <div class="input-group">
                <label>📱 Numéro de téléphone</label>
                <input type="tel" id="phone"
                       placeholder="+000 00 00 00 00">
            </div>

            <div class="input-group">
                <label>🔒 Mot de passe</label>
                <input type="password" id="password"
                       placeholder="Minimum 6 caractères" required>
            </div>

            <div class="input-group">
                <label>🔒 Confirmer le mot de passe</label>
                <input type="password" id="confirmPassword"
                       placeholder="Retapez votre mot de passe" required>
            </div>

            <button type="submit" class="btn-primary" id="btnRegister">
                🚀 Créer mon compte
            </button>

            <div class="loading-spinner" id="spinner"></div>

            <p class="auth-link">
                Déjà un compte ?
                <a href="login.html">Se connecter</a>
            </p>
        </form>

        <div id="message" class="message"></div>

        <div class="back-home">
            <a href="index.html">← Retour à l'accueil</a>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCuX3t2Ax1mZbtj6Co9zpZZvXMRmFOd6go",
    authDomain: "facture-pro-2a843.firebaseapp.com",
    projectId: "facture-pro-2a843",
    storageBucket: "facture-pro-2a843.firebasestorage.app",
    messagingSenderId: "30400911697",
    appId: "1:30400911697:web:a5ddafe5dcc58c0a38db70"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const form = document.getElementById('registerForm');
const message = document.getElementById('message');
const spinner = document.getElementById('spinner');
const btnRegister = document.getElementById('btnRegister');

// ============================
// 🛡️ RATE LIMIT INSCRIPTION
// ============================
function verifierRateLimit() {
    const key = 'inscription_attempts';
    const now = Date.now();
    const data = JSON.parse(localStorage.getItem(key) || '[]');
    const recent = data.filter(t => now - t < 60 * 60 * 1000);
    if (recent.length >= 3) {
        showMessage("❌ Trop d'inscriptions. Réessayez dans 1 heure.", "error");
        return false;
    }
    recent.push(now);
    localStorage.setItem(key, JSON.stringify(recent));
    return true;
}

// ============================
// 📝 INSCRIPTION
// ============================
form.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Vérifier rate limit
    if (!verifierRateLimit()) return;

    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    message.className = 'message';
    message.style.display = 'none';

    if (fullName.length < 3) { showMessage("❌ Le nom doit avoir au moins 3 caractères", "error"); return; }
    if (password.length < 6) { showMessage("❌ Le mot de passe doit avoir au moins 6 caractères", "error"); return; }
    if (password !== confirmPassword) { showMessage("❌ Les mots de passe ne correspondent pas", "error"); return; }

    // Vérifier force du mot de passe
    const hasUpperCase = /[A-Z]/.test(password);
    const hasNumber = /[0-9]/.test(password);
    if (!hasUpperCase || !hasNumber) {
        showMessage("⚠️ Le mot de passe doit contenir au moins une majuscule et un chiffre", "error");
        return;
    }

    btnRegister.disabled = true;
    btnRegister.style.display = 'none';
    spinner.style.display = 'block';

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        const trialEnd = new Date();
        trialEnd.setDate(trialEnd.getDate() + 30);

        const userData = {
            fullName: fullName,
            email: email,
            phone: phone,
            role: "client",
            createdAt: serverTimestamp(),
            lastLogin: serverTimestamp(),
            trialEnd: trialEnd,
            isPaid: false,
            plan: "gratuit",
            facturesCount: 0,
            maxFactures: 10,
            isActive: true,
            company: {
                name: "", logo: "", address: "", city: "",
                country: "", phone: "", email: "",
                website: "", description: "", taxId: ""
            }
        };

        await setDoc(doc(db, "users", user.uid), userData);

        // ✅ Mettre en cache
        localStorage.setItem('cache_userData_' + user.uid, JSON.stringify({ data: userData, timestamp: Date.now() }));

        showMessage("✅ Compte créé avec succès ! Redirection...", "success");

        setTimeout(() => {
            window.location.href = "client/dashboard.html";
        }, 2000);

    } catch (error) {
        spinner.style.display = 'none';
        btnRegister.style.display = 'block';
        btnRegister.disabled = false;

        let errorMsg = "❌ Une erreur est survenue";
        if (error.code === "auth/email-already-in-use") errorMsg = "❌ Cet email est déjà utilisé";
        else if (error.code === "auth/invalid-email") errorMsg = "❌ Email invalide";
        else if (error.code === "auth/weak-password") errorMsg = "❌ Mot de passe trop faible";
        else if (error.code === "auth/network-request-failed") errorMsg = "❌ Problème de connexion internet";

        showMessage(errorMsg, "error");
    }
});

function showMessage(text, type) {
    message.textContent = text;
    message.className = 'message ' + type;
    message.style.display = 'block';
}
</script>

<script src="js/cache.js"></script>
<script src="js/darkmode.js"></script>
</body>
</html>
